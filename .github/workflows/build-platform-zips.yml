name: Build platform zips

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.0.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            gradle: .\gradlew.bat
          - platform: linux-x64
            os: ubuntu-latest
            gradle: ./gradlew
          - platform: macos
            os: macos-latest
            gradle: ./gradlew

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build platform zip
        run: ${{ matrix.gradle }} core:test lwjgl3:zipAppImage

      - name: Upload platform zip
        uses: actions/upload-artifact@v7
        with:
          name: SkySpy-${{ matrix.platform }}
          path: lwjgl3/build/distributions/SkySpy-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: write

    steps:
      - name: Resolve release tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_TAG"
          else
            RELEASE_TAG="$REF_NAME"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is required."
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v', for example v1.0.0."
              exit 1
              ;;
          esac

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Download platform zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "$GITHUB_RUN_ID" --dir release-assets --pattern "SkySpy-*"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t zip_files < <(find release-assets -type f -name '*.zip' -print | sort)
          if [ "${#zip_files[@]}" -eq 0 ]; then
            echo "No release zip files found."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${zip_files[@]}" --clobber
          else
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              gh release create "$RELEASE_TAG" "${zip_files[@]}" --title "$RELEASE_TAG" --notes "Automated release for $RELEASE_TAG." --target "$GITHUB_SHA"
            else
              gh release create "$RELEASE_TAG" "${zip_files[@]}" --title "$RELEASE_TAG" --notes "Automated release for $RELEASE_TAG."
            fi
          fi
