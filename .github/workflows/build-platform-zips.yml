name: Build platform zips

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            gradle: .\gradlew.bat
          - platform: linux-x64
            os: ubuntu-latest
            gradle: ./gradlew
          - platform: macos
            os: macos-latest
            gradle: ./gradlew

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build platform zip
        run: ${{ matrix.gradle }} core:test lwjgl3:zipAppImage

      - name: Upload platform zip
        uses: actions/upload-artifact@v7
        with:
          name: SkySpy-${{ matrix.platform }}
          path: lwjgl3/build/distributions/SkySpy-${{ matrix.platform }}.zip
          if-no-files-found: error
