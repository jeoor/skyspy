name: Build platform zips

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            gradle: .\gradlew.bat
          - platform: linux-x64
            os: ubuntu-latest
            gradle: ./gradlew
          - platform: macos
            os: macos-latest
            gradle: ./gradlew

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build platform zip
        run: ${{ matrix.gradle }} core:test lwjgl3:zipAppImage

      - name: Upload platform zip
        uses: actions/upload-artifact@v7
        with:
          name: SkySpy-${{ matrix.platform }}
          path: lwjgl3/build/distributions/SkySpy-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download platform zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "$GITHUB_RUN_ID" --dir release-assets --pattern "SkySpy-*"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t zip_files < <(find release-assets -type f -name '*.zip' -print | sort)
          if [ "${#zip_files[@]}" -eq 0 ]; then
            echo "No release zip files found."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${zip_files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${zip_files[@]}" --title "$TAG_NAME" --notes "Automated release for $TAG_NAME."
          fi
